name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Lint (ruff check)
        run: uv run ruff check

  docker-smoke:
    # Build the runtime image and verify the CLI imports + dispatches inside it.
    # Catches deploy bugs where a runtime artifact is missing — the kind of
    # failure that only shows up when the app actually starts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: sync-to-readwise:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test entrypoint and CLI
        # ``--help`` exercises Click discovery of every subcommand, which
        # transitively imports every Source. An import or registration bug
        # surfaces here even without runtime secrets.
        run: |
          docker run --rm sync-to-readwise:ci sync-to-readwise --help
          docker run --rm sync-to-readwise:ci sync-to-readwise setup youtube --help
